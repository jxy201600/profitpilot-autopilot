<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>ProfitPilot Autopilot</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #172033;
        --muted: #5c667a;
        --line: #d9e2ef;
        --panel: #ffffff;
        --soft: #f4f8fb;
        --accent: #0f7b8a;
        --accent2: #6844c6;
        --good: #136f42;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--ink);
        background: linear-gradient(135deg, #eef7f8, #f7f4ff 48%, #f8fbf6);
      }
      main {
        width: min(1180px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 28px 0;
      }
      header {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 20px;
        align-items: end;
        padding-bottom: 18px;
        border-bottom: 1px solid rgba(23, 32, 51, .12);
      }
      h1 { margin: 0; font-size: 34px; letter-spacing: 0; }
      .subtitle { margin: 8px 0 0; color: var(--muted); max-width: 720px; line-height: 1.5; }
      .badge {
        display: inline-flex;
        gap: 8px;
        align-items: center;
        padding: 8px 12px;
        border-radius: 999px;
        color: #fff;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        font-size: 13px;
        font-weight: 700;
      }
      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(360px, .9fr);
        gap: 18px;
        margin-top: 22px;
      }
      section {
        background: rgba(255,255,255,.82);
        border: 1px solid rgba(23, 32, 51, .1);
        border-radius: 8px;
        padding: 18px;
        box-shadow: 0 18px 60px rgba(31, 50, 80, .08);
      }
      h2 { margin: 0 0 12px; font-size: 18px; }
      textarea {
        width: 100%;
        min-height: 260px;
        resize: vertical;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 14px;
        font: 15px/1.5 ui-monospace, "SFMono-Regular", Consolas, monospace;
        color: var(--ink);
        background: #fff;
      }
      button {
        margin-top: 12px;
        border: 0;
        border-radius: 8px;
        padding: 12px 16px;
        font-weight: 800;
        color: #fff;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        cursor: pointer;
      }
      button:disabled { opacity: .62; cursor: wait; }
      .result {
        display: grid;
        gap: 12px;
      }
      .item {
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px;
        background: var(--soft);
      }
      .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: .04em; font-weight: 800; }
      .value { margin-top: 6px; line-height: 1.45; }
      ul { margin: 8px 0 0; padding-left: 20px; }
      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        background: #101828;
        color: #e8f2ff;
        padding: 12px;
        border-radius: 8px;
        max-height: 360px;
        overflow: auto;
      }
      @media (max-width: 840px) {
        header, .grid { grid-template-columns: 1fr; }
        h1 { font-size: 28px; }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>ProfitPilot Autopilot</h1>
          <p class="subtitle">Qwen Cloud powered agent for turning messy small-business inquiries into quote packets, payment gates, and delivery plans.</p>
        </div>
        <span class="badge">Qwen Cloud Hackathon · Autopilot Agent</span>
      </header>
      <div class="grid">
        <section>
          <h2>Inquiry</h2>
          <textarea id="inquiry">Hi, we run a small wholesale snack brand. We receive product inquiries from distributors by email and WeChat, but our team loses track of quote versions, follow-ups, and payment status. Can you set up a lightweight workflow that turns inquiry text into a quote, follow-up checklist, and customer reply? We prefer Chinese and English templates. We need something we can use this week.</textarea>
          <button id="run">Run Agent</button>
        </section>
        <section>
          <h2>Autopilot Packet</h2>
          <div id="result" class="result">
            <div class="item"><div class="label">Status</div><div class="value">Ready</div></div>
          </div>
        </section>
      </div>
    </main>
    <script>
      const result = document.getElementById("result");
      const button = document.getElementById("run");
      const inquiry = document.getElementById("inquiry");
      const list = (items) => `<ul>${(items || []).map((item) => `<li>${String(item)}</li>`).join("")}</ul>`;
      const item = (label, value) => `<div class="item"><div class="label">${label}</div><div class="value">${value}</div></div>`;
      button.addEventListener("click", async () => {
        button.disabled = true;
        result.innerHTML = item("Status", "Running");
        try {
          const response = await fetch("/api/run", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ inquiry: inquiry.value }),
          });
          const data = await response.json();
          if (!data.ok) {
            result.innerHTML = item("Blocked", data.message || data.error || "Request blocked");
            return;
          }
          result.innerHTML = [
            item("Mode", data.mode),
            item("Quote", `${data.packet.quote.title}<br>${data.packet.quote.price} ${data.packet.quote.currency}<br>${data.packet.quote.deliveryTime}`),
            item("Customer Reply", data.packet.customerReply),
            item("Missing Inputs", list(data.packet.missingInputs)),
            item("Tool Plan", list((data.packet.toolPlan || []).map((step) => `${step.id}: ${step.tool} -> ${step.status}`))),
            item("Human Checkpoints", list(data.packet.humanCheckpoints)),
            item("JSON", `<pre>${JSON.stringify(data.packet, null, 2)}</pre>`),
          ].join("");
        } catch (error) {
          result.innerHTML = item("Error", error.message);
        } finally {
          button.disabled = false;
        }
      });
    </script>
  </body>
</html>
